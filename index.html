<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de USB</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 2em;
        }

        main {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            text-align: center;
        }

        section h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        section p {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .promotional-image {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .whatsapp-btn {
            display: inline-block;
            background-color: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background-color: #1ebe5d;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Venta de USB</h1>
        <p>Películas, series y más en un solo lugar</p>
    </header>

    <main>
        <section>
            <h2>Contenido Disponible</h2>

            <img src="ventasUSB.jpeg" alt="Contenido en USB" class="promotional-image">

            <p>
                Disfruta de películas, series, anime y música en USB de alta calidad. 
                Compatible con TV, computadora y carro.
            </p>

            <p>
                Contáctanos para más información y pedidos personalizados.
            </p>

            <!-- BOTÓN DE WHATSAPP -->
            <a class="whatsapp-btn" 
               href="https://wa.me/507XXXXXXX?text=Hola,%20quiero%20comprar%20USB"
               target="_blank">
               Contactar por WhatsApp
            </a>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Venta de USB</p>
    </footer>

</body>
</html>
